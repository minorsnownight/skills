<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{team_title}}</title>
    <style>
      :root {
        --bg: #f5f5f4;
        --panel: #fffdfa;
        --line: #ddd6d3;
        --text: #1c1917;
        --muted: #78716c;
        --accent: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 18px;
        background: var(--bg);
        color: var(--text);
        font-family: "PingFang SC", "Noto Sans SC", sans-serif;
      }
      .share-card {
        max-width: 760px;
        margin: 0 auto;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 18px;
      }
      .header {
        margin-bottom: 12px;
      }
      .title {
        font-size: 20px;
        font-weight: 700;
        line-height: 1.35;
      }
      .code {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }
      .source-url {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }
      .meta-bar {
        display: flex;
        justify-content: space-between;
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }
      .divider {
        height: 1px;
        background: var(--line);
        margin: 12px 0;
      }
      .pokemon-row {
        display: grid;
        grid-template-columns: 104px 1fr;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
      }
      .pokemon-row:last-child { border-bottom: 0; }
      .art {
        position: relative;
        min-height: 92px;
      }
      .pokemon-image {
        width: 92px;
        height: 92px;
        object-fit: contain;
      }
      .item-image {
        position: absolute;
        right: 4px;
        bottom: 4px;
        width: 28px;
        height: 28px;
        object-fit: contain;
        background: rgba(255,255,255,0.92);
        border-radius: 999px;
        padding: 3px;
      }
      .name-line {
        display: flex;
        gap: 8px;
        align-items: baseline;
        margin-bottom: 4px;
      }
      .name-zh { font-size: 16px; font-weight: 700; }
      .name-en { font-size: 12px; color: var(--muted); }
      .meta-line {
        display: flex;
        gap: 6px;
        font-size: 12px;
        line-height: 1.45;
        margin-bottom: 2px;
      }
      .label { min-width: 36px; color: var(--muted); }
      .moves {
        display: flex;
        flex-wrap: wrap;
        gap: 4px 10px;
        font-size: 12px;
        line-height: 1.45;
        margin-top: 2px;
      }
      .move { color: var(--text); }
      .actions {
        max-width: 760px;
        margin: 12px auto 0;
        text-align: center;
      }
      #save-image-btn {
        padding: 8px 20px;
        font-size: 14px;
        color: var(--text);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
      }
      #save-image-btn:hover { background: var(--line); }
    </style>
  </head>
  <body>
    <main class="share-card" data-template="{{template_name}}">
      <header class="header">
        <div class="title">{{team_title}}</div>
        <div class="code">{{format_readable}}</div>
        <div class="source-url">{{team_code}}</div>
        <div class="meta-bar">
          <span>{{source_url}}</span>
          <span>{{generated_date}} © {{copyright_name}}</span>
        </div>
      </header>
      <div class="divider"></div>
      <section class="team-list">
        {{team_rows}}
      </section>
    </main>
    <div class="actions">
      <button id="save-image-btn" onclick="saveAsImage()">SAVE</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
    function saveAsImage() {
      var btn = document.getElementById('save-image-btn');
      btn.style.visibility = 'hidden';
      html2canvas(document.querySelector('.share-card'), {scale: 2, useCORS: true}).then(function(canvas) {
        btn.style.visibility = 'visible';
        var a = document.createElement('a');
        a.download = 'team-card.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
      }).catch(function() {
        btn.style.visibility = 'visible';
        alert('图片生成失败，请尝试截图保存');
      });
    }
    </script>
  </body>
</html>
