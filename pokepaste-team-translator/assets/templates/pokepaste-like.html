<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{team_title}}</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        background: #f5f5f4;
        color: #1f2937;
        font-family: "Helvetica Neue", "PingFang SC", sans-serif;
      }
      .share-card {
        max-width: 760px;
        margin: 0 auto;
        background: #fffdfa;
        border: 1px solid #d6d3d1;
        border-radius: 16px;
        padding: 16px;
      }
      .title {
        font-size: 19px;
        font-weight: 700;
        line-height: 1.35;
      }
      .code {
        margin-top: 4px;
        font-size: 12px;
        color: #6b7280;
      }
      hr {
        border: 0;
        border-top: 1px solid #d6d3d1;
        margin: 12px 0;
      }
      .pokemon-row {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 12px;
        padding: 8px 0;
      }
      .pokemon-row + .pokemon-row {
        border-top: 1px solid #e7e5e4;
      }
      .art {
        position: relative;
        min-height: 88px;
      }
      .pokemon-image {
        width: 88px;
        height: 88px;
        object-fit: contain;
      }
      .item-image {
        position: absolute;
        right: 0;
        bottom: 2px;
        width: 24px;
        height: 24px;
        object-fit: contain;
        background: #fff;
        border-radius: 999px;
      }
      .name-line {
        display: flex;
        gap: 8px;
        align-items: baseline;
        margin-bottom: 3px;
      }
      .name-zh { font-size: 15px; font-weight: 700; }
      .name-en { font-size: 12px; color: #6b7280; }
      .meta-line,
      .moves {
        font-size: 12px;
        line-height: 1.45;
      }
      .meta-line { margin-bottom: 1px; }
      .label { color: #b91c1c; margin-right: 6px; }
      .moves {
        display: flex;
        flex-wrap: wrap;
        gap: 4px 10px;
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <main class="share-card" data-template="{{template_name}}">
      <header>
        <div class="title">{{team_title}}</div>
        <div class="code">队伍码 {{team_code}}</div>
      </header>
      <hr>
      {{team_rows}}
    </main>
  </body>
</html>
