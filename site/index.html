<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝可梦队伍中文翻译器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #111;
            color: #e0e0e0;
            font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
            min-height: 100vh;
        }

        /* 顶部输入栏 */
        .input-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #1a1a2e;
            border-bottom: 1px solid #333;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-bar h1 {
            font-size: 16px;
            white-space: nowrap;
            color: #78C850;
        }
        .input-bar input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #222;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .input-bar input:focus { border-color: #78C850; }
        .input-bar button {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            background: #78C850;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .input-bar button:hover { background: #5ca030; }
        .input-bar button:disabled { background: #555; cursor: not-allowed; }

        .status {
            font-size: 13px;
            color: #888;
            margin-left: 8px;
        }
        .status.error { color: #F08030; }

        /* 队伍展示区 */
        .team-display {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .team-title {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 16px;
            padding: 0 15px;
        }
        .team-format {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
            padding: 0 15px;
        }

        /* 单只宝可梦卡片 - 复刻 PokePast 风格 */
        .team-grid {
            display: flex;
            flex-wrap: wrap;
        }

        article {
            display: flex;
            flex-flow: row wrap;
            align-items: flex-start;
            width: 50%;
        }

        @media (max-width: 800px) {
            article { width: 100%; }
        }

        div.img {
            position: relative;
            margin: 15px;
            user-select: none;
        }

        img.img-pokemon {
            width: 150px;
            height: 150px;
            image-rendering: pixelated;
        }

        img.img-item {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 40px;
            height: 40px;
        }

        pre {
            margin: 15px 15px 0;
            font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
            font-size: 15px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        /* 属性颜色 */
        .type-normal { color: #A8A878 }
        .type-fighting { color: #C03028 }
        .type-flying { color: #A890F0 }
        .type-poison { color: #A040A0 }
        .type-ground { color: #E0C068 }
        .type-rock { color: #B8A038 }
        .type-bug { color: #A8B820 }
        .type-ghost { color: #705898 }
        .type-steel { color: #B8B8D0 }
        .type-fire { color: #F08030 }
        .type-water { color: #6890F0 }
        .type-grass { color: #78C850 }
        .type-electric { color: #F8D030 }
        .type-psychic { color: #F85888 }
        .type-ice { color: #98D8D8 }
        .type-dragon { color: #7038F8 }
        .type-dark { color: #705848 }
        .type-fairy { color: #EE99AC }

        .attr { color: #A0A0A0 }

        /* 空状态提示 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #555;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="input-bar">
        <h1>PokePast 中文化</h1>
        <input type="text" id="urlInput" placeholder="输入 PokePast 链接，如 https://pokepast.es/...">
        <button id="translateBtn" onclick="handleTranslate()">翻译</button>
        <span class="status" id="status"></span>
    </div>

    <div class="team-display" id="teamDisplay">
        <div class="empty-state">输入 PokePast 链接，点击翻译</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
